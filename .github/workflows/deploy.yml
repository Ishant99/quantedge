# =============================================================================
# .github/workflows/deploy.yml — CI/CD for NSE Trading Agent
#
# Trigger: push to main branch
# Pipeline:
#   1. Lint & basic sanity checks
#   2. SSH into Oracle VM
#   3. Pull latest code from GitHub
#   4. Rebuild Docker image
#   5. Restart containers with zero-downtime strategy
#   6. Smoke-test dashboard health endpoint
#
# Required GitHub Secrets:
#   ORACLE_HOST        — VM IP (e.g. 144.24.143.86)
#   ORACLE_SSH_KEY     — private SSH key (PEM, paste full content)
#   GH_PAT             — GitHub Personal Access Token (repo scope)
#   TELEGRAM_BOT_TOKEN — Telegram bot token for deploy notifications
#   TELEGRAM_CHAT_ID   — Telegram chat ID for deploy notifications
# =============================================================================

name: Deploy to Oracle VM

on:
  push:
    branches: [ main, codex-v2-phase-rollout ]
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Branch or ref to deploy manually"
        required: false
        default: "codex-v2-phase-rollout"

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_ref || github.ref_name }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: |
          find . -name "*.py" -not -path "./.venv/*" | while read f; do
            python -m py_compile "$f" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Verify critical files exist
        run: |
          for f in requirements.txt Dockerfile docker-compose.yml; do
            [ -f "$f" ] && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done

  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
          ssh-keyscan -H "${{ secrets.ORACLE_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Oracle VM
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          ssh -i ~/.ssh/oracle_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              ubuntu@$ORACLE_HOST << 'ENDSSH'
          set -e

          DEPLOY_DIR="/home/ubuntu/quantedge"
          DEPLOY_REF="${{ github.event_name == 'workflow_dispatch' && inputs.deploy_ref || github.ref_name }}"
          mkdir -p "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"

          if [ -d ".git" ]; then
            echo "[GIT] Pulling latest for ${DEPLOY_REF}..."
            git fetch origin "$DEPLOY_REF"
            git checkout -B "$DEPLOY_REF" "origin/$DEPLOY_REF"
          else
            echo "[GIT] Fresh clone..."
            git clone https://x-access-token:${GH_PAT}@github.com/Ishant99/quantedge.git .
            git fetch origin "$DEPLOY_REF"
            git checkout -B "$DEPLOY_REF" "origin/$DEPLOY_REF"
          fi

          if [ ! -f .env ]; then
            echo "[ENV] Creating empty .env (first deploy only)"
            touch .env
          else
            echo "[ENV] Preserving existing .env"
          fi

          if ! swapon --show | grep -q "/swapfile"; then
            echo "[SWAP] Setting up 1GB swapfile..."
            sudo fallocate -l 1G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=1M count=1024
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            grep -q "^/swapfile " /etc/fstab || echo "/swapfile none swap sw 0 0" | sudo tee -a /etc/fstab > /dev/null
          fi

          echo "[DOCKER] Restarting containers..."
          docker compose down
          docker compose up -d --build --remove-orphans

          echo "[DOCKER] Cleaning old images..."
          docker image prune -f

          sleep 10
          docker compose ps
          ENDSSH

      - name: Smoke test dashboard health
        run: |
          sleep 15
          curl --fail --silent --max-time 15 \
            "http://${{ secrets.ORACLE_HOST }}:8501/_stcore/health" \
            && echo "Dashboard is healthy"

      - name: Notify Telegram on success
        if: success()
        run: |
          MSG="✅ *QuantEdge Deployed*%0ACommit: ${{ github.sha }}%0ABranch: ${{ github.ref_name }}%0ABy: ${{ github.actor }}"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MSG}&parse_mode=Markdown" \
            > /dev/null

      - name: Notify Telegram on failure
        if: failure()
        run: |
          MSG="❌ *QuantEdge Deploy FAILED*%0ACommit: ${{ github.sha }}%0ABy: ${{ github.actor }}%0ACheck GitHub Actions for details."
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MSG}&parse_mode=Markdown" \
            > /dev/null
