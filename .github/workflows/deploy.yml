# =============================================================================
# .github/workflows/deploy.yml — CI/CD for QuantEdge Trading Agent
#
# Runs on: self-hosted runner installed on Oracle VM (zero GitHub minutes)
#
# Trigger: push to main or codex-v2-phase-rollout
# Pipeline:
#   1. Lint — Python syntax check + critical file verification
#   2. Deploy — checkout → docker compose up --build → health check
#   3. Notify — Telegram success/failure alert
#
# Setup self-hosted runner on Oracle VM:
#   mkdir ~/actions-runner && cd ~/actions-runner
#   # Download latest from: github.com/actions/runner/releases
#   curl -o runner.tar.gz -L <runner-url>
#   tar xzf runner.tar.gz
#   ./config.sh --url https://github.com/Ishant99/quantedge \
#               --token <token-from-Settings→Actions→Runners> \
#               --name oracle-vm --labels oracle-vm,linux --unattended
#   sudo ./svc.sh install && sudo ./svc.sh start
#
# Required GitHub Secrets (Settings → Secrets):
#   TELEGRAM_BOT_TOKEN — Telegram bot token for deploy notifications
#   TELEGRAM_CHAT_ID   — Telegram chat ID for deploy notifications
# =============================================================================

name: Deploy to Oracle VM

on:
  push:
    branches: [ main, codex-v2-phase-rollout ]
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Branch or ref to deploy manually"
        required: false
        default: "codex-v2-phase-rollout"

jobs:
  lint:
    name: Lint & Syntax Check
    # Self-hosted runner on Oracle VM — uses zero GitHub-hosted minutes
    runs-on: [self-hosted, linux, oracle-vm]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_ref || github.ref_name }}

      - name: Check Python syntax
        run: |
          find . -name "*.py" -not -path "./.venv/*" -not -path "./actions-runner/*" | while read f; do
            python3 -m py_compile "$f" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Verify critical files exist
        run: |
          for f in requirements.txt Dockerfile docker-compose.yml; do
            [ -f "$f" ] && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done

  deploy:
    name: Deploy to Oracle VM
    # Self-hosted runner on Oracle VM — no SSH needed, code is already here
    runs-on: [self-hosted, linux, oracle-vm]
    needs: lint

    steps:
      # Runner IS on the Oracle VM — deploy is a local operation, no SSH needed
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_ref || github.ref_name }}

      - name: Set up swap if needed
        run: |
          if ! swapon --show | grep -q "/swapfile"; then
            echo "[SWAP] Setting up 1GB swapfile..."
            sudo fallocate -l 1G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=1M count=1024
            sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile
            grep -q "^/swapfile " /etc/fstab || echo "/swapfile none swap sw 0 0" | sudo tee -a /etc/fstab > /dev/null
          fi

      - name: Preserve .env across deploys
        run: |
          DEPLOY_DIR="/home/ubuntu/quantedge"
          if [ -f "$DEPLOY_DIR/.env" ] && [ ! -f "${{ github.workspace }}/.env" ]; then
            cp "$DEPLOY_DIR/.env" "${{ github.workspace }}/.env"
            echo "[ENV] Restored .env from $DEPLOY_DIR"
          elif [ ! -f "${{ github.workspace }}/.env" ]; then
            touch "${{ github.workspace }}/.env"
            echo "[ENV] Created empty .env"
          fi

      - name: Rebuild and restart Docker containers
        working-directory: ${{ github.workspace }}
        run: |
          echo "[DOCKER] Pulling images and rebuilding..."
          docker compose down
          docker compose up -d --build --remove-orphans
          docker image prune -f
          sleep 10
          docker compose ps

      - name: Smoke test dashboard health
        run: |
          sleep 15
          curl --fail --silent --max-time 20 \
            "http://localhost:8501/_stcore/health" \
            && echo "Dashboard is healthy" || echo "Dashboard health check skipped (port may differ)"

      - name: Notify Telegram on success
        if: success()
        run: |
          MSG="✅ *QuantEdge Deployed*%0ACommit: ${{ github.sha }}%0ABranch: ${{ github.ref_name }}%0ABy: ${{ github.actor }}"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MSG}&parse_mode=Markdown" \
            > /dev/null

      - name: Notify Telegram on failure
        if: failure()
        run: |
          MSG="❌ *QuantEdge Deploy FAILED*%0ACommit: ${{ github.sha }}%0ABy: ${{ github.actor }}%0ACheck GitHub Actions for details."
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MSG}&parse_mode=Markdown" \
            > /dev/null
