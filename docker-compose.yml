# =============================================================================
# docker-compose.yml — NSE Trading Agent
# Optimized for Oracle Free Tier: 1GB RAM, 1 OCPU
#
# Services:
#   scheduler  — runs main pipeline at 9:15 AM + 3 PM IST (Mon-Fri)
#   dashboard  — Streamlit web UI on port 8501
#
# Memory budget (1GB total):
#   scheduler  → 400MB limit (TA + sentiment + chromadb)
#   dashboard  → 350MB limit (Streamlit + plotly)
#   OS/Docker  → ~250MB reserved
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Scheduler — daily trading pipeline
  # ---------------------------------------------------------------------------
  scheduler:
    build: .
    image: quantedge:latest
    container_name: quantedge_scheduler
    restart: unless-stopped
    command: python scheduler/scheduler.py

    environment:
      - TRADING_MODE=${TRADING_MODE:-paper}
      - KITE_API_KEY=${KITE_API_KEY:-}
      - KITE_API_SECRET=${KITE_API_SECRET:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    volumes:
      - trading_logs:/app/logs
      - trading_data:/app/data/market_data_cache

    # 1GB RAM VM: cap scheduler at 400MB
    deploy:
      resources:
        limits:
          memory: 400M
        reservations:
          memory: 200M

    # Health check — confirm process is alive
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Dashboard — Streamlit web UI
  # ---------------------------------------------------------------------------
  dashboard:
    image: quantedge:latest
    container_name: quantedge_dashboard
    restart: unless-stopped
    command: >
      streamlit run dashboard/app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
      --browser.gatherUsageStats=false
      --server.maxUploadSize=10

    environment:
      - TRADING_MODE=${TRADING_MODE:-paper}
      - KITE_API_KEY=${KITE_API_KEY:-}
      - KITE_API_SECRET=${KITE_API_SECRET:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    volumes:
      - trading_logs:/app/logs

    ports:
      - "8501:8501"

    # 1GB RAM VM: cap dashboard at 350MB
    deploy:
      resources:
        limits:
          memory: 350M
        reservations:
          memory: 150M

    depends_on:
      - scheduler

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ---------------------------------------------------------------------------
# Named volumes — persists logs + portfolio data across container restarts
# ---------------------------------------------------------------------------
volumes:
  trading_logs:
    driver: local
  trading_data:
    driver: local
